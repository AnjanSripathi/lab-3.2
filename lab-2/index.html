<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <div class = "flex-container">
      <div class = "flex-container1">
        <img src = "./assets/images/illustration-article.svg" alt = "illustration-article">
      </div>
      <div class = "flex-container2">
        <p id = "learn">Learning</p>
        <p id = "publish">Published 21 Dec 2023</p>
        <h2 id = "highlight">HTML & CSS foundations</h2>
        <p id = "content">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class = "flex-container3">
        <div class = "image-container">
            <img src = "./assets/images/image-avatar.webp" alt="avatar">
        </div>
        <div class = "name-container">
          <p>Greg Hooper</p>
        </div>
        
      </div>
    </div>
  

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Anjan Kumar Sripati Panditaradhyula</a>.
  </footer>
  </main>
  </body>
</html>
