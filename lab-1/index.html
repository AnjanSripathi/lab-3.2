<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> -->
  <link rel="stylesheet" href="style1.css">  
  <!-- Precedence matters; placing the CSS last will help in overriding the bootstrap properties -->
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class = "d-flex flex-column justify-content-center align-items-center min-vh-100">
  <div class = "flex-container d-flex flex-column mx-auto bg-white w-md-50 w-lg-25 p-3 rounded-4">
    <section class = "qr-code">
      <img src = "./images/image-qr-code.png" class = "img-fluid rounded" alt = "QR-code">
    </section>
    <section class = "content mt-2">
      <h3>Improve your front-end skills by building projects </h3>
      <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level </p>
    </section>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Anjan Kumar Sripati Panditaradhyula</a>.
  </footer>
</body>
